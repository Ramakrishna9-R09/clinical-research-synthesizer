services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./storage:/app/storage
    depends_on:
      - redis

  ui:
    build: .
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  ingest:
    build: .
    command: python -c "from app.retrieval.ingestion import ingest_data_dir; print(ingest_data_dir())"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    profiles:
      - jobs
